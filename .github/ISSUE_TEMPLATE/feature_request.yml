name: Feature request
description: Propose a capability or module
title: "feature: "
labels: [enhancement, needs-triage]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user/server setup problem should Servy solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: safety
    attributes:
      label: Safety and idempotency considerations
      description: What could go wrong on a production server? How should dry-run and repeated runs behave?
    validations:
      required: true
  - type: textarea
    id: scope
    attributes:
      label: Out of scope
